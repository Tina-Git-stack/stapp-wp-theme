      <stop offset="0%"   stop-color="#00D2FF"/>
      <stop offset="8%"   stop-color="#00D2FF"/>
      <stop offset="20%"  stop-color="#0060A0"/>
      <stop offset="30%"  stop-color="#0060A0"/>
      <stop offset="40%"  stop-color="#00D2FF"/>
      <stop offset="48%"  stop-color="#00D2FF"/>
